spring.application.name=reactAndSpringboot

server.port=8080

# ============================================================
#  Banco de Dados - MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/lojaGermano?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=26Diogo1024.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  Connection Pool (HikariCP)
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
#  JPA / Hibernate
# ============================================================
# update = cria/altera tabelas automaticamente (dev).
# Em produção use: validate ou none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
#  Logs
# ============================================================
logging.level.com.example.demo=DEBUG
logging.level.org.hibernate.SQL=DEBUG
